---
- name: Solve Module 03 — Database Node Selector
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _token: "{{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
    _pg_label: "app.kubernetes.io%2Fcomponent%3Ddatabase%2Capp.kubernetes.io%2Fname%3Dpostgres-15"

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set namespace and CR name facts
      ansible.builtin.set_fact:
        current_namespace: "{{ r_ns.content | b64decode | trim }}"
        aap_cr_name: "{{ r_ns.content | b64decode | trim | regex_replace('-scenario-[0-9]+$', '') }}-aap"

    - name: Patch AAP CR to remove database node_selector
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/aap.ansible.com/v1alpha1/namespaces/{{ current_namespace }}/ansibleautomationplatforms/{{ aap_cr_name }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ _token }}"
          Content-Type: "application/merge-patch+json"
        body_format: json
        body:
          spec:
            database:
              node_selector: null
        validate_certs: false
        status_code: [200, 201]

    - name: Get stuck postgres pod
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/pods?labelSelector={{ _pg_label }}"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200]
      register: r_pg_pods

    - name: Delete stuck postgres pod so it gets rescheduled
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/pods/{{ item.metadata.name }}"
        method: DELETE
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 202, 404]
      loop: "{{ r_pg_pods.json['items'] | default([]) }}"

    - name: Show completion message
      ansible.builtin.copy:
        content: |
          [INFO]
          [OK] Module 03 solved

          Fixed:
          - Patched AAP CR database.node_selector to null
          - Deleted stuck postgres pod so it reschedules on a schedulable node

          Wait 2-3 minutes for postgres to restart, then click Validate.
        dest: "{{ job_info_dir }}/validation_failure.out"
        mode: '0644'
      delegate_to: localhost
      when: job_info_dir is defined
