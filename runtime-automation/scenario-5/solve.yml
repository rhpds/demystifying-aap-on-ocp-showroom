---
- name: Solve Module 05 — Hub Content Resource Limits
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _token: "{{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set namespace and CR name facts
      ansible.builtin.set_fact:
        current_namespace: "{{ r_ns.content | b64decode | trim }}"
        aap_cr_name: "{{ r_ns.content | b64decode | trim | regex_replace('-scenario-[0-9]+$', '') }}-aap"

    - name: Patch AutomationHub CR to increase content resource limits
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/automationhub.ansible.com/v1beta1/namespaces/{{ current_namespace }}/automationhubs/{{ aap_cr_name }}-hub"
        method: PATCH
        headers:
          Authorization: "Bearer {{ _token }}"
          Content-Type: "application/merge-patch+json"
        body_format: json
        body:
          spec:
            content:
              resource_requirements:
                limits:
                  cpu: 1000m
                  memory: 8Gi
                requests:
                  cpu: 100m
                  memory: 200Mi
        validate_certs: false
        status_code: [200, 201]

    - name: Show completion message
      ansible.builtin.copy:
        content: |
          [INFO]
          [OK] Module 05 solved

          Fixed:
          - Patched AutomationHub CR content memory limit from 800Mi to 8Gi

          The operator will restart Hub content pods with the new limits.
          Wait 2-3 minutes, then try syncing the Community repository.
          Click Validate to confirm.
        dest: "{{ job_info_dir }}/validation_failure.out"
        mode: '0644'
      delegate_to: localhost
      when: job_info_dir is defined
