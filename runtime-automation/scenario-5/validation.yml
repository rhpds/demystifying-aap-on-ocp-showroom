---
- name: Validate Module 05 — Hub Content Resource Limits
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _token: "{{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set namespace and CR name facts
      ansible.builtin.set_fact:
        current_namespace: "{{ r_ns.content | b64decode | trim }}"
        aap_cr_name: "{{ r_ns.content | b64decode | trim | regex_replace('-scenario-[0-9]+$', '') }}-aap"

    - name: Get AutomationHub CR
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/automationhub.ansible.com/v1beta1/namespaces/{{ current_namespace }}/automationhubs/{{ aap_cr_name }}-hub"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_hub_cr

    - name: Get Hub file storage PVC
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/persistentvolumeclaims/{{ aap_cr_name }}-hub-file-storage"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_pvc

    - name: Get Hub pods
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/pods?labelSelector=app.kubernetes.io%2Fname%3Dautomation-hub"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_hub_pods

    - name: Parse content memory limit from AutomationHub CR
      ansible.builtin.set_fact:
        content_mem_limit_mi: >-
          {{
            r_hub_cr.json.spec.content.resource_requirements.limits.memory
            | default('0Mi')
            | regex_replace('Gi$', '000')
            | regex_replace('Mi$', '')
            | int
          }}
      when:
        - r_hub_cr.status == 200
        - r_hub_cr.json.spec.content is defined

    - name: Evaluate checks
      ansible.builtin.set_fact:
        content_memory_ok: "{{ (content_mem_limit_mi | default(0) | int) >= 2000 }}"
        pvc_bound: >-
          {{
            r_pvc.status == 200 and
            r_pvc.json.status.phase == 'Bound'
          }}
        hub_pods_running: >-
          {{
            r_hub_pods.status == 200 and
            r_hub_pods.json['items'] | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
          }}

    - name: Validate all tasks
      validation_check:
        check: "{{ content_memory_ok and pvc_bound and hub_pods_running }}"
        pass_msg: |
          ✅ Hub content memory limit is adequate (>= 2Gi)
          ✅ Hub PVC {{ aap_cr_name }}-hub-file-storage is Bound
          ✅ Hub pods Running
        error_msg: |
          {{ '✅' if content_memory_ok else '❌' }} Hub content memory limit is adequate
          {{ '✅' if pvc_bound else '❌' }} Hub PVC {{ aap_cr_name }}-hub-file-storage is Bound
          {{ '✅' if hub_pods_running else '❌' }} Hub pods Running
