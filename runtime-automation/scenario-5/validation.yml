---
- name: Validate Module 05 — Hub File Storage Size
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _token: "{{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set namespace and CR name facts
      ansible.builtin.set_fact:
        current_namespace: "{{ r_ns.content | b64decode | trim }}"
        aap_cr_name: "{{ r_ns.content | b64decode | trim | regex_replace('-scenario-[0-9]+$', '') }}-aap"

    - name: Get AAP CR
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/aap.ansible.com/v1alpha1/namespaces/{{ current_namespace }}/ansibleautomationplatforms/{{ aap_cr_name }}"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_aap_cr

    - name: Get Hub file storage PVC
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/persistentvolumeclaims/{{ aap_cr_name }}-hub-file-storage"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_pvc

    - name: Get Hub content pods
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/pods?labelSelector=app.kubernetes.io%2Fpart-of%3Dautomationhub"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_hub_pods

    - name: Parse hub file_storage_size from CR (convert to Mi for comparison)
      ansible.builtin.set_fact:
        hub_storage_size_mi: >-
          {{
            r_aap_cr.json.spec.hub.file_storage_size | default('0Mi')
            | regex_replace('Gi$', '000')
            | regex_replace('Mi$', '')
            | int
          }}
      when: r_aap_cr.status == 200 and r_aap_cr.json.spec.hub is defined

    - name: Evaluate checks
      ansible.builtin.set_fact:
        storage_size_ok: "{{ (hub_storage_size_mi | default(0) | int) >= 1000 }}"
        pvc_bound: >-
          {{
            r_pvc.status == 200 and
            r_pvc.json.status.phase == 'Bound'
          }}
        hub_pods_running: >-
          {{
            r_hub_pods.status == 200 and
            r_hub_pods.json['items'] | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
          }}

    - name: Validate all tasks
      validation_check:
        check: "{{ storage_size_ok and pvc_bound and hub_pods_running }}"
        pass_msg: |
          ✅ Hub file_storage_size >= 10Gi
          ✅ Hub PVC {{ aap_cr_name }}-hub-file-storage is Bound
          ✅ Hub pods Running
        error_msg: |
          {{ '✅' if storage_size_ok else '❌' }} Hub file_storage_size >= 10Gi (was 25Mi)
          {{ '✅' if pvc_bound else '❌' }} Hub PVC {{ aap_cr_name }}-hub-file-storage is Bound
          {{ '✅' if hub_pods_running else '❌' }} Hub pods Running
