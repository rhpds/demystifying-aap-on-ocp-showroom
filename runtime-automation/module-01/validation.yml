---
- name: Validate Module 01 — Automation Hub Storage
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _token: "{{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set namespace and CR name facts
      ansible.builtin.set_fact:
        current_namespace: "{{ r_ns.content | b64decode | trim }}"
        aap_cr_name: "{{ r_ns.content | b64decode | trim | regex_replace('-scenario-[0-9]+$', '') }}-aap"

    - name: Get AAP CR
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/aap.ansible.com/v1alpha1/namespaces/{{ current_namespace }}/ansibleautomationplatforms/{{ aap_cr_name }}"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_aap_cr

    - name: Get Hub file storage PVC
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/persistentvolumeclaims/{{ aap_cr_name }}-hub-file-storage"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_pvc

    - name: Get Hub content pods
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/pods?labelSelector=app.kubernetes.io%2Fname%3Dautomation-hub"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_hub_pods

    - name: Evaluate checks
      ansible.builtin.set_fact:
        storage_class_set: >-
          {{
            r_aap_cr.status == 200 and
            r_aap_cr.json.spec.hub is defined and
            r_aap_cr.json.spec.hub.file_storage_storage_class is defined and
            r_aap_cr.json.spec.hub.file_storage_storage_class | length > 0
          }}
        pvc_bound: >-
          {{
            r_pvc.status == 200 and
            r_pvc.json.status.phase == 'Bound'
          }}
        hub_pods_running: >-
          {{
            r_hub_pods.status == 200 and
            r_hub_pods.json.items | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
          }}

    - name: Set validation output
      ansible.builtin.set_fact:
        validation_output: |
          Module 01: Automation Hub Storage
          ==================================
          {{ '[OK]' if storage_class_set else '[X] ' }} Hub file_storage_storage_class is set
          {{ '[OK]' if pvc_bound else '[X] ' }} Hub PVC {{ aap_cr_name }}-hub-file-storage is Bound
          {{ '[OK]' if hub_pods_running else '[X] ' }} Hub pods Running
        validation_passed: "{{ storage_class_set and pvc_bound and hub_pods_running }}"

    - name: Write failure details
      ansible.builtin.copy:
        content: "{{ validation_output }}"
        dest: "{{ job_info_dir }}/validation_failure.out"
        mode: '0644'
      delegate_to: localhost
      when:
        - job_info_dir is defined
        - not validation_passed | bool

    - name: Fail if not passed
      ansible.builtin.fail:
        msg: "Complete the missing tasks and try again."
      when: not validation_passed | bool
