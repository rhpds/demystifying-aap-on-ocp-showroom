---
- name: Validate Module 06 — ALIA Lightspeed Configuration
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _token: "{{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set namespace and CR name facts
      ansible.builtin.set_fact:
        current_namespace: "{{ r_ns.content | b64decode | trim }}"
        aap_cr_name: "{{ r_ns.content | b64decode | trim | regex_replace('-scenario-[0-9]+$', '') }}-aap"

    - name: Get chatbot configuration secret
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/secrets/chatbot-configuration-secret"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_chatbot_secret

    - name: Decode chatbot_model from secret
      ansible.builtin.set_fact:
        chatbot_model: "{{ r_chatbot_secret.json.data.chatbot_model | b64decode }}"
      when: r_chatbot_secret.status == 200

    - name: Evaluate checks
      ansible.builtin.set_fact:
        secret_exists: "{{ r_chatbot_secret.status == 200 }}"
        correct_model: "{{ (chatbot_model | default('')) == 'granite-3-2-8b-instruct' }}"

    - name: Validate all tasks
      validation_check:
        check: "{{ secret_exists and correct_model }}"
        pass_msg: |
          ✅ chatbot-configuration-secret exists
          ✅ chatbot_model = granite-3-2-8b-instruct
        error_msg: |
          {{ '✅' if secret_exists else '❌' }} chatbot-configuration-secret exists
          {{ '✅' if correct_model else '❌' }} chatbot_model = granite-3-2-8b-instruct (got: {{ chatbot_model | default('not found') }})
