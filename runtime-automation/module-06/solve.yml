  ---
  # runtime-automation/module-06/solve.yml
  # Module 6: Controller Job Issues - Solver

  - name: Get AnsibleAutomationPlatform CR
    ansible.builtin.uri:
      url: "https://kubernetes.default.svc/apis/aap.ansible.com/v1alpha1/namespaces/aap-rh1/ansibleautomationplatforms"
      method: GET
      headers:
        Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
      validate_certs: false
    register: r_aap_cr

  - name: Set Controller URL
    ansible.builtin.set_fact:
      aap_cr_name: "{{ r_aap_cr.json.items[0].metadata.name }}"
      controller_host: "{{ r_aap_cr.json.items[0].status.URL }}"
    when: r_aap_cr.json.items | length > 0

  - name: Get AAP admin password
    ansible.builtin.uri:
      url: "https://kubernetes.default.svc/api/v1/namespaces/aap-rh1/secrets/{{ aap_cr_name }}-admin-password"
      method: GET
      headers:
        Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
      validate_certs: false
    register: r_admin_secret

  - name: Decode admin password
    ansible.builtin.set_fact:
      aap_admin_password: "{{ r_admin_secret.json.data.password | b64decode }}"

  - name: Get job templates from Controller API
    ansible.builtin.uri:
      url: "{{ controller_host }}/api/v2/job_templates/"
      method: GET
      user: admin
      password: "{{ aap_admin_password }}"
      force_basic_auth: true
      validate_certs: false
      status_code: [200, 404]
    register: r_job_templates
    when: controller_host is defined

  - name: Extract execution environment IDs
    ansible.builtin.set_fact:
      ee_ids: "{{ r_job_templates.json.results | map(attribute='execution_environment') | select('number') | list }}"
    when:
      - r_job_templates.status | default(404) == 200
      - r_job_templates.json.results | default([]) | length > 0

  - name: Find most common EE ID (the valid one)
    ansible.builtin.set_fact:
      valid_ee_id: >-
        {{ ee_ids | community.general.counter | dict2items | sort(attribute='value', reverse=true) | first | map(attribute='key') | first }}
    when:
      - ee_ids is defined
      - ee_ids | length > 0

  - name: Find job templates with different EE (the broken one)
    ansible.builtin.set_fact:
      broken_templates: >-
        {{
          r_job_templates.json.results | selectattr('execution_environment', 'defined') |
          selectattr('execution_environment', 'ne', valid_ee_id | int) | list
        }}
    when:
      - r_job_templates.status | default(404) == 200
      - valid_ee_id is defined

  - name: Update broken job template(s) to use valid EE
    ansible.builtin.uri:
      url: "{{ controller_host }}/api/v2/job_templates/{{ item.id }}/"
      method: PATCH
      user: admin
      password: "{{ aap_admin_password }}"
      force_basic_auth: true
      headers:
        Content-Type: "application/json"
      body_format: json
      body:
        execution_environment: "{{ valid_ee_id | int }}"
      validate_certs: false
      status_code: [200, 201]
    loop: "{{ broken_templates | default([]) }}"
    when:
      - broken_templates is defined
      - broken_templates | length > 0

  - name: Show completion message
    ansible.builtin.copy:
      content: |
        [INFO]
        [OK] Module 6 solved

        Fixed:
        - Updated job template(s) to use valid Execution Environment
        - All templates now use EE ID: {{ valid_ee_id | default('N/A') }}

        Job templates should launch successfully now. Click Next to validate.
      dest: "{{ job_info_dir }}/validation_failure.out"
    delegate_to: localhost
    when: job_info_dir is defined
