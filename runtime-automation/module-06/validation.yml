---
# runtime-automation/module-06/validation.yml
# Module 6: Controller Job Issues

- name: Validate Module 6 - Controller Jobs
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Get namespace aap-rh1
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/aap-rh1"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_namespace

    - name: Get all pods in namespace
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/aap-rh1/pods"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_all_pods

    - name: Filter for automation-job pods
      ansible.builtin.set_fact:
        job_pods: >-
          {{
            r_all_pods.json.items | selectattr('metadata.name', 'match', '^automation-job-.*') | list
            if r_all_pods.status == 200
            else []
          }}

    - name: Check for ImagePullBackOff errors
      ansible.builtin.set_fact:
        imagepull_errors: >-
          {{
            job_pods |
            selectattr('status.containerStatuses', 'defined') |
            map(attribute='status.containerStatuses') | flatten |
            selectattr('state.waiting.reason', 'defined') |
            selectattr('state.waiting.reason', 'match', 'ImagePullBackOff|ErrImagePull') | list
          }}

    - name: Get Controller pods
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/aap-rh1/pods?labelSelector=app.kubernetes.io%2Fcomponent%3Dcontroller"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_controller_pods

    - name: Evaluate checks
      ansible.builtin.set_fact:
        namespace_exists: "{{ r_namespace.status == 200 }}"
        controller_running: >-
          {{
            r_controller_pods.status == 200 and
            r_controller_pods.json.items | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
          }}
        no_imagepull_errors: "{{ imagepull_errors | length == 0 }}"

    - name: Calculate validation result
      ansible.builtin.set_fact:
        validation_passed: >-
          {{
            namespace_exists | bool and
            controller_running | bool and
            no_imagepull_errors | bool
          }}

    - name: Set validation output
      ansible.builtin.set_fact:
        validation_output: |
          Module 6: Controller Jobs
          =========================
          {{ '[OK]' if namespace_exists else '[X] ' }} Namespace aap-rh1 exists
          {{ '[OK]' if controller_running else '[X] ' }} Controller pod is Running
          {{ '[OK]' if no_imagepull_errors else '[X] ' }} No ImagePullBackOff errors in job pods

    - name: Write validation output
      ansible.builtin.copy:
        content: "{{ validation_output }}"
        dest: "{{ job_info_dir }}/validation_failure.out"
      delegate_to: localhost
      when:
        - job_info_dir is defined
        - not validation_passed | bool

    - name: Fail if not passed
      ansible.builtin.fail:
        msg: "Complete the missing tasks and try again."
      when: not validation_passed | bool
