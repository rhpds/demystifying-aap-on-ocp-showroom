---
- name: Validate Module 06 — ALIA Lightspeed Configuration
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _token: "{{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set namespace and CR name facts
      ansible.builtin.set_fact:
        current_namespace: "{{ r_ns.content | b64decode | trim }}"
        aap_cr_name: "{{ r_ns.content | b64decode | trim | regex_replace('-scenario-[0-9]+$', '') }}-aap"

    - name: Get chatbot configuration secret
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/secrets/chatbot-configuration-secret"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_chatbot_secret

    - name: Get AAP CR
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/aap.ansible.com/v1alpha1/namespaces/{{ current_namespace }}/ansibleautomationplatforms/{{ aap_cr_name }}"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_aap_cr

    - name: Decode chatbot_model from secret
      ansible.builtin.set_fact:
        chatbot_model: "{{ r_chatbot_secret.json.data.chatbot_model | b64decode }}"
      when: r_chatbot_secret.status == 200

    - name: Evaluate checks
      ansible.builtin.set_fact:
        secret_exists: "{{ r_chatbot_secret.status == 200 }}"
        correct_model: "{{ (chatbot_model | default('')) == 'granite-3-2-8b-instruct' }}"
        lightspeed_enabled: >-
          {{
            r_aap_cr.status == 200 and
            (
              r_aap_cr.json.spec.lightspeed is not defined or
              r_aap_cr.json.spec.lightspeed.disabled | default(false) == false
            )
          }}

    - name: Set validation output
      ansible.builtin.set_fact:
        validation_output: |
          Module 06: ALIA Lightspeed Configuration
          =========================================
          {{ '[OK]' if secret_exists else '[X] ' }} chatbot-configuration-secret exists
          {{ '[OK]' if correct_model else '[X] ' }} chatbot_model = granite-3-2-8b-instruct (got: {{ chatbot_model | default('not found') }})
          {{ '[OK]' if lightspeed_enabled else '[X] ' }} Lightspeed is enabled in AAP CR
        validation_passed: "{{ secret_exists and correct_model and lightspeed_enabled }}"

    - name: Write failure details
      ansible.builtin.copy:
        content: "{{ validation_output }}"
        dest: "{{ job_info_dir }}/validation_failure.out"
        mode: '0644'
      delegate_to: localhost
      when:
        - job_info_dir is defined
        - not validation_passed | bool

    - name: Fail if not passed
      ansible.builtin.fail:
        msg: "Complete the missing tasks and try again."
      when: not validation_passed | bool
