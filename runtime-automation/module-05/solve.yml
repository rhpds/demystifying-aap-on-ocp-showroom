---
# runtime-automation/module-05/solve.yml
# Module 5: Hub Memory/Storage Issues - Solver

- name: Solve Module 5 - Hub Resources
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Get AutomationHub CR
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/automationhub.ansible.com/v1beta1/namespaces/aap-rh1/automationhubs"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
      register: r_ah_cr

    - name: Extract Hub name
      ansible.builtin.set_fact:
        ah_name: "{{ r_ah_cr.json.items[0].metadata.name }}"
      when: r_ah_cr.json.items | length > 0

    - name: Patch AutomationHub CR to increase memory
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/automationhub.ansible.com/v1beta1/namespaces/aap-rh1/automationhubs/{{ ah_name }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
          Content-Type: "application/merge-patch+json"
        body_format: json
        body:
          spec:
            web:
              resource_requirements:
                limits:
                  memory: "8Gi"
        validate_certs: false
        status_code: [200, 201]

    - name: Get Hub PVC
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/aap-rh1/persistentvolumeclaims?labelSelector=app.kubernetes.io%2Fcomponent%3Dstorage"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
      register: r_hub_pvc

    - name: Expand PVC to 10Gi
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/aap-rh1/persistentvolumeclaims/{{ item.metadata.name }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
          Content-Type: "application/merge-patch+json"
        body_format: json
        body:
          spec:
            resources:
              requests:
                storage: "10Gi"
        validate_certs: false
        status_code: [200, 201]
      loop: "{{ r_hub_pvc.json.items | default([]) }}"

    - name: Show completion message
      ansible.builtin.copy:
        content: |
          [INFO]
          [OK] Module 5 solved

          Fixed:
          - Updated Hub web memory limit to 8Gi
          - Expanded PVC to 10Gi

          The operator will restart Hub pods with new memory limits.
          This may take 2-3 minutes. Click Next to validate.
        dest: "{{ job_info_dir }}/validation_failure.out"
      delegate_to: localhost
      when: job_info_dir is defined
