---
# runtime-automation/module-05/validation.yml
# Module 5: Hub Memory/Storage Issues

- name: Validate Module 5 - Hub Resources
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Get namespace aap-rh1
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/aap-rh1"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_namespace

    - name: Get AutomationHub CR
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/automationhub.ansible.com/v1beta1/namespaces/aap-rh1/automationhubs"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_ah_cr

    - name: Extract Hub resources
      ansible.builtin.set_fact:
        hub_memory_limit: >-
          {{
            r_ah_cr.json.items[0].spec.web.resource_requirements.limits.memory
            if (r_ah_cr.status == 200 and
                r_ah_cr.json.items | length > 0 and
                r_ah_cr.json.items[0].spec.web is defined and
                r_ah_cr.json.items[0].spec.web.resource_requirements is defined and
                r_ah_cr.json.items[0].spec.web.resource_requirements.limits is defined and
                r_ah_cr.json.items[0].spec.web.resource_requirements.limits.memory is defined)
            else ''
          }}

    - name: Get Hub PVCs
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/aap-rh1/persistentvolumeclaims?labelSelector=app.kubernetes.io%2Fcomponent%3Dstorage"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_hub_pvcs

    - name: Extract PVC size
      ansible.builtin.set_fact:
        pvc_size_gi: >-
          {{
            r_hub_pvcs.json.items[0].spec.resources.requests.storage | regex_replace('([0-9]+)Gi', '\\1') | int
            if (r_hub_pvcs.status == 200 and
                r_hub_pvcs.json.items | length > 0 and
                r_hub_pvcs.json.items[0].spec.resources.requests.storage is defined)
            else 0
          }}

    - name: Get Hub pods
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/aap-rh1/pods?labelSelector=app.kubernetes.io%2Fcomponent%3Dweb"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_hub_pods

    - name: Check for OOMKilled pods
      ansible.builtin.set_fact:
        oomkilled_pods: >-
          {{
            r_hub_pods.json.items | default([]) |
            selectattr('status.containerStatuses', 'defined') |
            map(attribute='status.containerStatuses') | flatten |
            selectattr('lastState.terminated.reason', 'defined') |
            selectattr('lastState.terminated.reason', 'equalto', 'OOMKilled') | list
          }}

    - name: Evaluate checks
      ansible.builtin.set_fact:
        namespace_exists: "{{ r_namespace.status == 200 }}"
        hub_memory_ok: >-
          {{
            hub_memory_limit | regex_replace('([0-9]+)Gi', '\\1') | int >= 8
            if hub_memory_limit | length > 0
            else false
          }}
        pvc_size_ok: "{{ pvc_size_gi | int >= 10 }}"
        no_oomkilled: "{{ oomkilled_pods | length == 0 }}"

    - name: Calculate validation result
      ansible.builtin.set_fact:
        validation_passed: >-
          {{
            namespace_exists | bool and
            hub_memory_ok | bool and
            pvc_size_ok | bool and
            no_oomkilled | bool
          }}

    - name: Set validation output
      ansible.builtin.set_fact:
        validation_output: |
          Module 5: Hub Resources
          =======================
          {{ '[OK]' if namespace_exists else '[X] ' }} Namespace aap-rh1 exists
          {{ '[OK]' if hub_memory_ok else '[X] ' }} Hub web memory limit >= 8Gi (current: {{ hub_memory_limit | default('not set') }})
          {{ '[OK]' if pvc_size_ok else '[X] ' }} PVC size >= 10Gi (current: {{ pvc_size_gi }}Gi)
          {{ '[OK]' if no_oomkilled else '[X] ' }} No OOMKilled pods

    - name: Write validation output
      ansible.builtin.copy:
        content: "{{ validation_output }}"
        dest: "{{ job_info_dir }}/validation_failure.out"
      delegate_to: localhost
      when:
        - job_info_dir is defined
        - not validation_passed | bool

    - name: Fail if not passed
      ansible.builtin.fail:
        msg: "Complete the missing tasks and try again."
      when: not validation_passed | bool
