---
- name: Validate Module 04 — Execution Environment Credentials
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _token: "{{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set namespace and CR name facts
      ansible.builtin.set_fact:
        current_namespace: "{{ r_ns.content | b64decode | trim }}"
        aap_cr_name: "{{ r_ns.content | b64decode | trim | regex_replace('-scenario-[0-9]+$', '') }}-aap"

    - name: List all pods in namespace
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/pods"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_pods

    - name: Get AAP CR to find gateway URL
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/aap.ansible.com/v1alpha1/namespaces/{{ current_namespace }}/ansibleautomationplatforms/{{ aap_cr_name }}"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_aap_cr

    - name: Get admin password from secret
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/secrets/{{ aap_cr_name }}-admin-password"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_admin_secret

    - name: Set gateway URL and admin password
      ansible.builtin.set_fact:
        gateway_url: "{{ r_aap_cr.json.status.URL | default('') }}"
        admin_password: "{{ r_admin_secret.json.data.password | b64decode }}"
      when:
        - r_aap_cr.status == 200
        - r_aap_cr.json.status is defined
        - r_admin_secret.status == 200

    - name: Get job templates from AAP Controller API
      ansible.builtin.uri:
        url: "{{ gateway_url }}/api/controller/v2/job_templates/"
        method: GET
        url_username: admin
        url_password: "{{ admin_password | default('') }}"
        force_basic_auth: true
        validate_certs: false
        status_code: [200, 401, 404]
      register: r_job_templates
      when:
        - gateway_url is defined
        - gateway_url | length > 0
        - admin_password is defined

    - name: Count job templates still using RH1-EE1
      ansible.builtin.set_fact:
        bad_ee_count: >-
          {{
            r_job_templates.json.results | default([])
            | selectattr('execution_environment', 'defined')
            | selectattr('execution_environment.name', 'defined')
            | selectattr('execution_environment.name', 'equalto', 'RH1-EE1')
            | list | length
          }}
      when:
        - r_job_templates is defined
        - r_job_templates.status | default(0) == 200

    - name: Count pods in ImagePullBackOff
      ansible.builtin.set_fact:
        imagepullbackoff_count: >-
          {{
            r_pods.json.items | default([])
            | selectattr('status.containerStatuses', 'defined')
            | map(attribute='status.containerStatuses')
            | flatten
            | selectattr('state.waiting.reason', 'defined')
            | selectattr('state.waiting.reason', 'equalto', 'ImagePullBackOff')
            | list | length
          }}
      when: r_pods.status | default(0) == 200

    - name: Evaluate checks
      ansible.builtin.set_fact:
        no_imagepullbackoff: "{{ (imagepullbackoff_count | default(0) | int) == 0 }}"
        no_bad_ee_templates: "{{ (bad_ee_count | default(0) | int) == 0 }}"

    - name: Validate all tasks
      validation_check:
        check: "{{ no_imagepullbackoff and no_bad_ee_templates }}"
        pass_msg: |
          ✅ No pods in ImagePullBackOff
          ✅ No job templates using RH1-EE1
        error_msg: |
          {{ '✅' if no_imagepullbackoff else '❌' }} No pods in ImagePullBackOff ({{ imagepullbackoff_count | default(0) }} found)
          {{ '✅' if no_bad_ee_templates else '❌' }} No job templates using RH1-EE1 ({{ bad_ee_count | default(0) }} found)
