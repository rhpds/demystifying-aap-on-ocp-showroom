---
# runtime-automation/module-04/solve.yml
# Module 4: Gateway Pod Issues - Solver

- name: Solve Module 4 - Gateway Memory
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Get AnsibleAutomationPlatform CR
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/aap.ansible.com/v1alpha1/namespaces/aap-rh1/ansibleautomationplatforms"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
      register: r_aap_cr

    - name: Extract AAP CR name
      ansible.builtin.set_fact:
        aap_cr_name: "{{ r_aap_cr.json.items[0].metadata.name }}"
      when: r_aap_cr.json.items | length > 0

    - name: Patch AAP CR to increase Gateway API memory
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/aap.ansible.com/v1alpha1/namespaces/aap-rh1/ansibleautomationplatforms/{{ aap_cr_name }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
          Content-Type: "application/merge-patch+json"
        body_format: json
        body:
          spec:
            gateway:
              api:
                resource_requirements:
                  limits:
                    memory: "1Gi"
        validate_certs: false
        status_code: [200, 201]

    - name: Get PostgreSQL StatefulSet
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/apps/v1/namespaces/aap-rh1/statefulsets?labelSelector=app.kubernetes.io%2Fcomponent%3Dpostgres"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
      register: r_postgres_sts

    - name: Delete PostgreSQL StatefulSet to force recreation
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/apps/v1/namespaces/aap-rh1/statefulsets/{{ item.metadata.name }}"
        method: DELETE
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
        status_code: [200, 404]
      loop: "{{ r_postgres_sts.json.items | default([]) }}"

    - name: Show completion message
      ansible.builtin.copy:
        content: |
          [INFO]
          [OK] Module 4 solved

          Fixed:
          - Updated Gateway API memory limit to 1Gi
          - Deleted PostgreSQL StatefulSet (operator will recreate)

          The operator will recreate the StatefulSet and Gateway pods.
          This may take 2-3 minutes. Click Next to validate.
        dest: "{{ job_info_dir }}/validation_failure.out"
      delegate_to: localhost
      when: job_info_dir is defined
