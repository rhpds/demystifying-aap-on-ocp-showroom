---                                                                                                                                                                                                                                                                                                                                                                   
# runtime-automation/module-02/solve.yml                                                                                                                                                                                                                                                                                                                              
# Module 2: Automation Hub Storage Issues - Solver                                                                                                                                                                                                                                                                                                                    

- name: Solve Module 2 - Automation Hub Storage
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Get AutomationHub CR
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/automationhub.ansible.com/v1beta1/namespaces/scenario-2/automationhubs"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
      register: r_ah_cr

    - name: Extract AutomationHub name
      ansible.builtin.set_fact:
        ah_name: "{{ r_ah_cr.json.items[0].metadata.name }}"
      when: r_ah_cr.json.items | length > 0

    - name: Patch AutomationHub CR to set storage class
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/automationhub.ansible.com/v1beta1/namespaces/scenario-2/automationhubs/{{ ah_name }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
          Content-Type: "application/merge-patch+json"
        body_format: json
        body:
          spec:
            file_storage_storage_class: "ocs-external-storagecluster-cephfs"
        validate_certs: false
        status_code: [200, 201]

    - name: Get existing PVC
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/scenario-2/persistentvolumeclaims?labelSelector=app.kubernetes.io%2Fname%3D{{ ah_name }}"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
      register: r_pvc

    - name: Delete old RWO PVC if exists
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/scenario-2/persistentvolumeclaims/{{ item.metadata.name }}"
        method: DELETE
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
        status_code: [200, 404]
      loop: "{{ r_pvc.json.items | default([]) }}"
      when:
        - r_pvc.json.items | length > 0
        - item.spec.accessModes | select('equalto', 'ReadWriteOnce') | list | length > 0

    - name: Delete operator manager pod to trigger reconciliation
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/scenario-2/pods?labelSelector=control-plane%3Dcontroller-manager"
        method: GET
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
      register: r_mgr_pods

    - name: Delete manager pods
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/scenario-2/pods/{{ item.metadata.name }}"
        method: DELETE
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
        status_code: [200, 404]
      loop: "{{ r_mgr_pods.json.items | default([]) }}"

    - name: Show completion message
      ansible.builtin.copy:
        content: |
          [INFO]
          [OK] Module 2 solved

          Fixed:
          - Updated AutomationHub CR file_storage_storage_class to ocs-external-storagecluster-cephfs
          - Deleted old RWO PVC
          - Restarted operator manager pod

          The operator will now create a new RWX PVC and Hub pods should start.
          This may take 2-3 minutes. Click Next to validate.
        dest: "{{ job_info_dir }}/validation_failure.out"
      delegate_to: localhost
      when: job_info_dir is defined
