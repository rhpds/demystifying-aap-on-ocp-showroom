---
- name: Solve Module 01 — Automation Hub Storage
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _token: "{{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set namespace and CR name facts
      ansible.builtin.set_fact:
        current_namespace: "{{ r_ns.content | b64decode | trim }}"
        aap_cr_name: "{{ r_ns.content | b64decode | trim | regex_replace('-scenario-[0-9]+$', '') }}-aap"

    - name: Patch AAP CR to set Hub file storage class
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/aap.ansible.com/v1alpha1/namespaces/{{ current_namespace }}/ansibleautomationplatforms/{{ aap_cr_name }}"
        method: PATCH
        headers:
          Authorization: "Bearer {{ _token }}"
          Content-Type: "application/merge-patch+json"
        body_format: json
        body:
          spec:
            hub:
              file_storage_storage_class: ocs-external-storagecluster-cephfs
        validate_certs: false
        status_code: [200, 201]

    - name: Get Hub Operator manager pods
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/pods?labelSelector=app.kubernetes.io%2Fname%3Dautomation-hub-operator"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_operator_pods

    - name: Delete operator manager pod to force restart before PVC deletion
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/pods/{{ item.metadata.name }}"
        method: DELETE
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 202, 404]
      loop: "{{ r_operator_pods.json['items'] | default([]) }}"
      when: r_operator_pods.status == 200

    - name: Wait for operator to restart and read updated CR
      ansible.builtin.pause:
        seconds: 30

    - name: Delete existing PVC so operator recreates with CephFS
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/persistentvolumeclaims/{{ aap_cr_name }}-hub-file-storage"
        method: DELETE
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 202, 404]

    - name: Delete hub-api deployment so operator redeploys cleanly
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/apps/v1/namespaces/{{ current_namespace }}/deployments/{{ aap_cr_name }}-hub-api"
        method: DELETE
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 202, 404]

    - name: Show completion message
      ansible.builtin.copy:
        content: |
          [INFO]
          [OK] Module 01 solved

          Fixed:
          - Patched Hub file_storage_storage_class to ocs-external-storagecluster-cephfs
          - Restarted operator so it reads updated CR before PVC is recreated
          - Deleted old PVC so operator recreates it with RWX/CephFS

          Hub pods will restart. Wait 5 minutes then click Validate.
        dest: "{{ job_info_dir }}/validation_failure.out"
        mode: '0644'
      delegate_to: localhost
      when: job_info_dir is defined
