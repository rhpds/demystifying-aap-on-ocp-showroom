---
- name: Validate Module 01 — Automation Hub Storage
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _token: "{{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set namespace and CR name facts
      ansible.builtin.set_fact:
        current_namespace: "{{ r_ns.content | b64decode | trim }}"
        aap_cr_name: "{{ r_ns.content | b64decode | trim | regex_replace('-scenario-[0-9]+$', '') }}-aap"

    - name: Get AutomationHub CR
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/automationhub.ansible.com/v1beta1/namespaces/{{ current_namespace }}/automationhubs/{{ aap_cr_name }}-hub"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_hub_cr

    - name: Get Hub file storage PVC
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/persistentvolumeclaims/{{ aap_cr_name }}-hub-file-storage"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_pvc

    - name: Get Hub content pods
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/pods?labelSelector=app.kubernetes.io%2Fpart-of%3Dautomationhub"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 404]
      register: r_hub_pods

    - name: Debug hub pods found
      ansible.builtin.debug:
        msg: >-
          Hub pods query status={{ r_hub_pods.status }},
          count={{ r_hub_pods.json['items'] | length }},
          running={{ r_hub_pods.json['items'] | selectattr('status.phase', 'equalto', 'Running') | list | length }},
          names={{ r_hub_pods.json['items'] | map(attribute='metadata.name') | list }}

    - name: Evaluate checks
      ansible.builtin.set_fact:
        storage_class_set: >-
          {{
            r_hub_cr.status == 200 and
            r_hub_cr.json.spec.file_storage_storage_class is defined and
            r_hub_cr.json.spec.file_storage_storage_class == 'ocs-external-storagecluster-cephfs'
          }}
        pvc_bound: >-
          {{
            r_pvc.status == 200 and
            r_pvc.json.status.phase == 'Bound'
          }}
        hub_pods_running: >-
          {{
            r_hub_pods.status == 200 and
            r_hub_pods.json['items'] | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
          }}

    - name: Validate all tasks
      validation_check:
        check: "{{ storage_class_set and pvc_bound and hub_pods_running }}"
        pass_msg: |
          ✅ Hub file_storage_storage_class is set
          ✅ Hub PVC {{ aap_cr_name }}-hub-file-storage is Bound
          ✅ Hub pods Running
        error_msg: |
          {{ '✅' if storage_class_set else '❌' }} Hub file_storage_storage_class is set
          {{ '✅' if pvc_bound else '❌' }} Hub PVC {{ aap_cr_name }}-hub-file-storage is Bound
          {{ '✅' if hub_pods_running else '❌' }} Hub pods Running
