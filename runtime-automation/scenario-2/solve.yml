---
- name: Solve Module 02 — Gateway Connectivity
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    _token: "{{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"

  tasks:
    - name: Read namespace from service account
      ansible.builtin.slurp:
        src: /var/run/secrets/kubernetes.io/serviceaccount/namespace
      register: r_ns

    - name: Set namespace and CR name facts
      ansible.builtin.set_fact:
        current_namespace: "{{ r_ns.content | b64decode | trim }}"
        aap_cr_name: "{{ r_ns.content | b64decode | trim | regex_replace('-scenario-[0-9]+$', '') }}-aap"

    - name: Scale gateway operator back to 1 replica
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/apis/apps/v1/namespaces/{{ current_namespace }}/deployments/aap-gateway-operator-controller-manager"
        method: PATCH
        headers:
          Authorization: "Bearer {{ _token }}"
          Content-Type: "application/merge-patch+json"
        body_format: json
        body:
          spec:
            replicas: 1
        validate_certs: false
        status_code: [200, 201]

    - name: Delete existing postgres-15 Service if present
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/services/{{ aap_cr_name }}-postgres-15"
        method: DELETE
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200, 202, 404]

    - name: Recreate postgres-15 Service
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/services"
        method: POST
        headers:
          Authorization: "Bearer {{ _token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ aap_cr_name }}-postgres-15"
            namespace: "{{ current_namespace }}"
            labels:
              app.kubernetes.io/component: database
              app.kubernetes.io/instance: "postgres-15-{{ aap_cr_name }}"
              app.kubernetes.io/name: postgres-15
          spec:
            selector:
              app.kubernetes.io/component: database
              app.kubernetes.io/instance: "postgres-15-{{ aap_cr_name }}"
              app.kubernetes.io/name: postgres-15
            ports:
              - name: postgres
                port: 5432
                targetPort: 5432
                protocol: TCP
            type: ClusterIP
        validate_certs: false
        status_code: [200, 201, 409]

    - name: Get admin password from secret
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/secrets/{{ aap_cr_name }}-admin-password"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200]
      register: r_admin_secret

    - name: Set admin password fact
      ansible.builtin.set_fact:
        admin_password: "{{ r_admin_secret.json.data.password | b64decode }}"

    - name: Get gateway pod name
      ansible.builtin.uri:
        url: "https://kubernetes.default.svc/api/v1/namespaces/{{ current_namespace }}/pods?labelSelector=app.kubernetes.io%2Fcomponent%3Daap-gateway"
        method: GET
        headers:
          Authorization: "Bearer {{ _token }}"
        validate_certs: false
        status_code: [200]
      register: r_gateway_pods
      until: >-
        r_gateway_pods.json['items'] | selectattr('status.phase', 'equalto', 'Running') | list | length > 0
      retries: 20
      delay: 15

    - name: Set gateway pod name fact
      ansible.builtin.set_fact:
        gateway_pod: >-
          {{
            r_gateway_pods.json['items']
            | selectattr('status.phase', 'equalto', 'Running')
            | map(attribute='metadata.name')
            | first
          }}

    - name: Reset admin password in gateway pod
      kubernetes.core.k8s_exec:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        namespace: "{{ current_namespace }}"
        pod: "{{ gateway_pod }}"
        command: "aap-gateway-manage update_password --username admin --password {{ admin_password }}"
      register: r_password_reset

    - name: Show completion message
      ansible.builtin.copy:
        content: |
          [INFO]
          [OK] Module 02 solved

          Fixed:
          - Scaled aap-gateway-operator-controller-manager back to 1 replica
          - Recreated {{ aap_cr_name }}-postgres-15 Service
          - Reset admin password to value from {{ aap_cr_name }}-admin-password secret

          Wait 2-3 minutes for the operator to reconcile, then click Validate.
        dest: "{{ job_info_dir }}/validation_failure.out"
        mode: '0644'
      delegate_to: localhost
      when: job_info_dir is defined
