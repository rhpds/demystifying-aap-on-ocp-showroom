---
name: FTL Syntax Gate

on:
  push:
    branches: [main, runtime-automation]
    paths:
      - 'runtime-automation/**'
      - 'ui-config.yml'
      - '.github/workflows/ftl-syntax-check.yml'
      - '.ansible-lint'
  pull_request:
    paths:
      - 'runtime-automation/**'
      - 'ui-config.yml'

jobs:
  syntax-check:
    name: Lint and Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install ansible-core ansible-lint yamllint

      - name: yamllint — runtime-automation
        run: yamllint -c runtime-automation/.yamllint runtime-automation/

      - name: yamllint — ui-config.yml
        run: yamllint -c runtime-automation/.yamllint ui-config.yml

      - name: ansible-lint — all playbooks
        run: |
          ansible-lint runtime-automation/main.yml \
            runtime-automation/scenario-*/solve.yml

      - name: Syntax check — all scenario/stage combinations
        run: |
          for module in scenario-1 scenario-2 scenario-3 scenario-4 scenario-5 scenario-6; do
            for stage in validation solve; do
              echo "=== syntax check: $module/$stage ==="
              ansible-playbook --syntax-check runtime-automation/main.yml \
                -e module_directory=$module \
                -e module_stage=$stage
            done
          done

      - name: Verify each scenario has solve.yml and validation.yml
        run: |
          FAILED=0
          for module in scenario-1 scenario-2 scenario-3 scenario-4 scenario-5 scenario-6; do
            for stage in solve validation; do
              if [ ! -f "runtime-automation/$module/$stage.yml" ]; then
                echo "ERROR: runtime-automation/$module/$stage.yml not found"
                FAILED=1
              fi
            done
          done
          if [ $FAILED -eq 1 ]; then exit 1; fi
          echo "All playbooks present"
