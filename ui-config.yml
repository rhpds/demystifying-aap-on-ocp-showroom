---
type: showroom

# Set the left column width to 40%
default_width: 40
# Persist the URL state so browser refresh doesn't reset the UI
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

# NOTE: At deploy time, these tabs are overridden by ocp4_workload_showroom
# via ocp4_workload_showroom_content_ui_config in the AgnosticV tenant common.yaml,
# which injects the real per-tenant AAP and OCP Console URLs.
# The tabs below are placeholders for local/GitHub Pages preview builds only.
tabs:
  - name: Ansible Automation Platform
    url: 'https://aap.example.com'
  - name: OpenShift Console
    url: 'https://console.example.com'

antora:
  name: modules
  dir: www
  modules:
    - name: module-02
      label: "Scenario #2: Automation Hub Issues"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: module-03
      label: "Scenario #3: Gateway Issues"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: module-04
      label: "Scenario #4: Gateway Memory Issues"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: module-05
      label: "Scenario #5: Automation Hub Sync Issues"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: module-06
      label: "Scenario #6: Automation Controller Job Issues"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: module-07
      label: "Scenario #7: Ansible Lightspeed (ALIA) Issues"
      solveButton: true
      scripts:
        - solve
        - validation
