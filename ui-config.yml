---
type: showroom

# Set the left column width to 40%
default_width: 40
# Persist the URL state so browser refresh doesn't reset the UI
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

# NOTE: At deploy time, these tabs are overridden by ocp4_workload_showroom
# via ocp4_workload_showroom_content_ui_config in the AgnosticV tenant common.yaml,
# which injects the real per-tenant AAP and OCP Console URLs.
# The tabs below are placeholders for local/GitHub Pages preview builds only.
tabs:
  - name: Ansible Automation Platform
    url: 'https://aap.example.com'
  - name: OpenShift Console
    url: 'https://console.example.com'

antora:
  name: modules
  dir: www
  modules:
    - name: scenario-1
      label: "Scenario 1: Hub PVC issue"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: scenario-2
      label: "Scenario 2: Wrong admin password / Database service missing"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: scenario-3
      label: "Scenario 3: Wrong node selector / High resource requests"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: scenario-4
      label: "Scenario 4: Job template with EE using wrong credentials"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: scenario-5
      label: "Scenario 5: Hub community sync limits / Hub sync storage issue"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: scenario-6
      label: "Scenario 6: ALIA troubleshooting wrong model"
      solveButton: true
      scripts:
        - solve
        - validation
