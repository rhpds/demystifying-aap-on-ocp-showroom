---
type: showroom

# Set the left column width to 30%
default_width: 30
# Persist the URL state so browser refresh doesn't reset the UI
persist_url_state: true

# Runtime automation - enable validation/solve for FTL testing
antora:
  modules:
    - name: module-02
      label: "Scenario #2: Automation Hub Issues"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: module-03
      label: "Scenario #3: Gateway Issues"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: module-04
      label: "Scenario #4: Gateway Memory Issues"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: module-05
      label: "Scenario #5: Automation Hub Memory/Storage Issues"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: module-06
      label: "Scenario #6: Automation Controller Job Issues"
      solveButton: true
      scripts:
        - solve
        - validation

    - name: module-07
      label: "Scenario #7: Ansible Lightspeed (ALIA) Issues"
      solveButton: true
      scripts:
        - solve
        - validation

