---
type: showroom

# Set the left column width to 40%
default_width: 40
# Persist the URL state so browser refresh doesn't reset the UI
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

# Tabs are injected at deploy time by ocp4_workload_showroom
# via ocp4_workload_showroom_content_ui_config in the AgnosticV tenant common.yaml.
# tabs:
#   - name: Ansible Automation Platform
#     url: 'https://{username}-aap-{namespace}.apps.{domain}'
